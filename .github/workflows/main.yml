name: LexMind Scheduler

on:
  schedule:
    - cron: '0 7 * * 1'
    - cron: '0 7 * * 2'
    - cron: '0 7 * * 3'
    - cron: '0 7 * * 4'
    - cron: '0 7 * * 5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python bot.py
